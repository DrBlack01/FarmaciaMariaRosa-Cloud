# =============================================
# Farmacia María Rosa - Perfil PRODUCCIÓN (Render)
# =============================================
# NOTA: Todas las variables con ${VAR} deben configurarse
#       en la sección "Environment Variables" de Render.
#       NO escribir valores reales en este archivo.

# Puerto dinámico asignado por Render
server.port=${PORT:8081}

# ================================
# Base de datos PostgreSQL (Render)
# ================================
# Ejemplo de DB_URL:
#   jdbc:postgresql://HOST:PORT/DB_NAME?sslmode=require
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración del pool de conexiones
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000

# ================================
# JPA / Hibernate
# ================================
# IMPORTANTE: Usar 'update' para preservar datos entre reinicios.
# NUNCA usar 'create' ni 'create-drop' en producción.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# CORS
# ================================
# Ejemplo: https://farmacia-maria-rosa.vercel.app
cors.allowed-origins=${FRONTEND_URL:http://localhost:5500}

# ================================
# JWT
# ================================
# IMPORTANTE: Usar una clave larga y aleatoria en producción.
# Generar con: openssl rand -base64 64
jwt.secret=${JWT_SECRET}

# ================================
# Administrador por defecto
# ================================
admin.email=${ADMIN_EMAIL:admin@farmacia.com}
admin.password=${ADMIN_PASSWORD:123456}
admin.create-default=${CREATE_DEFAULT_ADMIN:true}

# ================================
# Logging
# ================================
logging.level.com.proyectouno.demo=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
