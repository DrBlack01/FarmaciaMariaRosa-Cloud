# =============================================
# Farmacia María Rosa - Perfil DESARROLLO LOCAL
# =============================================

# Puerto del servidor (local)
server.port=8081

# ================================
# Base de datos PostgreSQL local
# ================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/farmacia_maria_rosa}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# CORS
# ================================
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

# ================================
# JWT
# ================================
jwt.secret=${JWT_SECRET}

# ================================
# Administrador por defecto
# ================================
admin.email=${ADMIN_EMAIL:admin@farmacia.com}
admin.password=${ADMIN_PASSWORD}
admin.create-default=${CREATE_DEFAULT_ADMIN:false}

# ================================
# Logging
# ================================
logging.level.com.proyectouno.demo=DEBUG
logging.level.org.springframework.security=DEBUG
