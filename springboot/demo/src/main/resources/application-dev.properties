# =============================================
# Farmacia María Rosa - Perfil DESARROLLO LOCAL
# =============================================

# Puerto del servidor (local)
server.port=8081

# ================================
# Base de datos PostgreSQL local
# ================================
spring.datasource.url=jdbc:postgresql://localhost:5432/farmacia_maria_rosa
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================
# CORS
# ================================
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000

# ================================
# JWT
# ================================
jwt.secret=bWlfY2xhdmVfc3VwZXJfc2VndXJhXzEyMzQ1Njc4OTAxMjM0NTY2

# ================================
# Administrador por defecto
# ================================
admin.email=admin@farmacia.com
admin.password=123456
admin.create-default=true

# ================================
# Logging
# ================================
logging.level.com.proyectouno.demo=DEBUG
logging.level.org.springframework.security=DEBUG
