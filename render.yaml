# =============================================
# render.yaml - Farmacia María Rosa
# Infraestructura como código para Render
# =============================================
# INSTRUCCIONES:
# 1. Crear un nuevo repositorio en GitHub con el código de FarmaciaMariaRosa-Cloud
# 2. Conectar ese repositorio a Render
# 3. Las variables marcadas como "sync: false" deben configurarse
#    manualmente en el panel de Render (son secretos)
# =============================================

services:
  # ---- Backend Spring Boot ----
  - type: web
    name: farmacia-maria-rosa-backend
    runtime: docker
    # Ruta al Dockerfile relativa a la raíz del repositorio
    dockerfilePath: ./springboot/demo/Dockerfile
    dockerContext: ./springboot/demo
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Perfil de Spring Boot
      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Base de datos (Render enlaza el PostgreSQL sin publicar credenciales)
      - key: DB_HOST
        fromDatabase:
          name: farmacia-maria-rosa-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: farmacia-maria-rosa-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: farmacia-maria-rosa-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: farmacia-maria-rosa-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: farmacia-maria-rosa-db
          property: password

      # Hibernate
      - key: DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: "false"

      # JWT (generar con: openssl rand -base64 64)
      - key: JWT_SECRET
        generateValue: true

      # CORS - URL del frontend desplegado
      - key: FRONTEND_URL
        sync: false  # ⚠️ Ingresar manualmente: https://farmacia-maria-rosa.vercel.app

      # Administrador por defecto
      - key: ADMIN_EMAIL
        sync: false  # ⚠️ Ingresar manualmente
      - key: ADMIN_PASSWORD
        sync: false  # ⚠️ Ingresar manualmente (marcar como secreto en Render)
      - key: CREATE_DEFAULT_ADMIN
        value: "true"

      # Carga inicial idempotente para una base de datos vacía
      - key: SEED_DEMO_DATA
        value: "true"

      # Chatbot Groq (opcional)
      - key: GROQ_API_KEY
        sync: false  # ⚠️ Ingresar manualmente si se usa el chatbot

# ---- Base de datos PostgreSQL ----
databases:
  - name: farmacia-maria-rosa-db
    plan: free
    databaseName: farmacia_maria_rosa
    user: farmacia_admin
    ipAllowList: []
